[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

# Railpack/Nixpacks set NODE_ENV=production during install, which skips
# vite/esbuild (devDependencies). Force full install so `npm run build` works.
[variables]
NPM_CONFIG_PRODUCTION = "false"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
